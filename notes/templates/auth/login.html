<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartNote AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#2f80ed,#56ccf2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card{
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            padding: 35px;
            background: white;
            border: none;
        }

        .btn-custom{
            border-radius: 10px;
            padding: 10px;
        }

        .form-control{
            border-radius: 10px;
            padding: 10px;
        }

        .title-text{
            color: #2f80ed;
        }

    </style>

</head>
<body>

    <div class="card shadow-lg login-card">

        <h2 class="text-center mb-4 fw-bold title-text">
            SmartNote AI
        </h2>

        {% if messages %}

            {% for message in messages %}

                <div class="alert alert-danger">
                    {{ message }}
                </div>

            {% endfor %}

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input
                type="text"
                name="username"
                class="form-control"
                required>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Password
                </label>

                <input
                type="password"
                name="password"
                class="form-control"
                required>

            </div>

            <button class="btn btn-primary w-100 btn-custom">
                Login
            </button>

            <p class="text-center mt-4 mb-0">

                Belum punya akun?
                <a href="/register/">
                    Register
                </a>

            </p>

        </form>

    </div>

</body>
</html>
