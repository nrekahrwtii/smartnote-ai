<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Catatan - SmartNote AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color: #f5f7fb;
        }

        .navbar-custom{
            background: #2f80ed;
        }

        .card-note{
            border-radius: 20px;
            border: none;
            background-color: white;
        }

        .summary-box{
            background: #eef5ff;
            border-left: 5px solid #2f80ed;
            border-radius: 15px;
        }

        .btn-custom{
            border-radius: 10px;
        }

        .summary-text{
            white-space: pre-wrap;
            font-family: Arial, sans-serif;
            line-height: 1.8;
            font-size: 15px;
            color: #333;
        }

    </style>

</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">

        <div class="container">

            <a class="navbar-brand fw-bold" href="/">
                SmartNote AI
            </a>

            <div class="d-flex gap-2">

                <a href="/" class="btn btn-light btn-sm">
                    Home
                </a>

                <a href="/logout/" class="btn btn-danger btn-sm">
                    Logout
                </a>

            </div>

        </div>

    </nav>

    <div class="container mt-5">

        <div class="card shadow p-4 card-note">

            <div class="mb-3">

                <span class="badge bg-primary">
                    {{ note.subject }}
                </span>

            </div>

            <h2 class="fw-bold">
                {{ note.title }}
            </h2>

            <hr>

            <p style="white-space: pre-line;">
                {{ note.content }}
            </p>

            <div class="mt-4 d-flex gap-2 flex-wrap">

                <a href="/edit-note/{{ note.id }}/"
                class="btn btn-primary btn-custom">

                    Edit

                </a>

                <a href="/delete-note/{{ note.id }}/"
                class="btn btn-outline-danger btn-custom">

                    Hapus

                </a>

                <a href="/summary/{{ note.id }}/"
                class="btn btn-success btn-custom">

                    Ringkas AI

                </a>

            </div>

            {% if note.summary %}

            <div class="summary-box p-4 mt-4">

                <h5 class="fw-bold mb-3">
                    🤖 Hasil Ringkasan AI
                </h5>

                <pre class="summary-text">{{ note.summary }}</pre>

            </div>

            {% endif %}

        </div>

    </div>

</body>
</html>
