<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Catatan - SmartNote AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color: #f5f7fb;
        }

        .navbar-custom{
            background: #2f80ed;
        }

        .form-card{
            border: none;
            border-radius: 20px;
            background-color: white;
        }

        .btn-custom{
            border-radius: 10px;
        }

        .page-title{
            color: #2f80ed;
            font-weight: bold;
        }

        textarea{
            resize: none;
        }

    </style>

</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">

        <div class="container">

            <a class="navbar-brand fw-bold" href="/">
                SmartNote AI
            </a>

            <div class="d-flex gap-2">

                <a href="/" class="btn btn-light btn-sm">
                    Home
                </a>

                <a href="/logout/" class="btn btn-danger btn-sm">
                    Logout
                </a>

            </div>

        </div>

    </nav>

    <div class="container mt-5">

        <div class="card shadow p-4 form-card">

            <h2 class="page-title mb-4">
                Edit Catatan
            </h2>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Mata Kuliah
                    </label>

                    <input
                    type="text"
                    name="subject"
                    class="form-control"
                    value="{{ note.subject }}"
                    required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Judul Catatan
                    </label>

                    <input
                    type="text"
                    name="title"
                    class="form-control"
                    value="{{ note.title }}"
                    required>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Isi Catatan
                    </label>

                    <textarea
                    name="content"
                    rows="8"
                    class="form-control"
                    required>{{ note.content }}</textarea>

                </div>

                <button class="btn btn-primary btn-custom">
                    Update Catatan
                </button>

            </form>

        </div>

    </div>

</body>
</html>
